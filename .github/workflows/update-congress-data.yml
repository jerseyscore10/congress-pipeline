name: Update congress trades

on:
  schedule:
    - cron: "0 9 * * *"      # daily 09:00 UTC (~5am ET) — before the 7am email reads it
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # allow the job to commit the JSON back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "congress-bot"
          git config user.email "actions@github.com"
          git add congress_trades.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update congress trades $(date -u +%Y-%m-%d)"
            git push
          fi
